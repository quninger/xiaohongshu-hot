footer{padding:24px 0 40px;text-align:center;font-size:12px;color:var(--mute)}

const T={
1:{c:"#dc2626"},2:{c:"#f06292"},3:{c:"#00b894"},4:{c:"#5b8c5a"}
};

let curTab=0;

function renderTab(idx){
  const d=DATA[idx];
  // Hero
  document.getElementById('heroTitle').innerHTML=`<em>${d.title}</em>`;
  // Stats
  document.getElementById('heroMeta').innerHTML=d.stat.map(s=>`<span>${s}</span>`).join('');
  // Rec
  const r=d.rec;
  document.getElementById('mainContent').innerHTML=
    `<div class="stats">${[d.stat[0],d.stat[1],d.stat[2],d.stat[3]].map((s,i)=>{
      const cs=['#dc2626','#2563eb','#16a34a','#7c3aed'];
      return `<div class="st-c"><div class="n" style="color:${cs[i]}">${s.split(' ')[0]}</div><div class="l">${s.replace(/^[^\s]+\s/,'')}</div></div>`
    }).join('')}</div>
    <div class="rec"><div class="rec-i">${r.i}</div><div class="rec-b"><div class="rec-l">${r.l}</div><div class="rec-t">${r.t}</div><div class="rec-d">${r.d}</div></div><a href="${r.u}" target="_blank" rel="noopener">去看看 · ${r.v}</a></div>
    <div class="sh"><h2>📋 全部榜单</h2><span>${d.cards.length} 条</span></div>
    <div class="grid">${d.cards.map(p=>`
    <a class="card" href="${p.u}" target="_blank" rel="noopener noreferrer">
    <div class="tp"><div class="rk">${p.r}</div><span class="tg">${p.g}</span></div>
    <div class="ti">${p.t}</div>
    <div class="vw">👁️ <b>${p.v}</b></div>
    <div class="su">${p.s}</div>
    ${p.m?`<div class="meta-tags">${p.m.map(t=>`<span>${t}</span>`).join('')}</div>`:''}
    <div class="go">查看详情 →</div></a>`).join('')}</div>`;
  // Update tabs
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
}

function switchTab(idx){
  curTab=idx;
  setTheme(+document.getElementById('themeSelect').value);
  renderTab(idx);
}

function setTheme(n){
  const t=T[n];
  document.getElementById('themeSelect').value=n;
  document.body.style.background=['#fafafa','#fef1ec','#f0fdfa','#f0f5ec'][n-1];
  document.documentElement.style.setProperty('--line',['#e5e5e5','#f5d5ca','#e5e5e5','#dce5d6'][n-1]);
  document.documentElement.style.setProperty('--accent',t.c);
  document.documentElement.style.setProperty('--ink',['#0a0a0a','#0a0a0a','#0a0a0a','#3a3a3a'][n-1]);
  document.documentElement.style.setProperty('--mute',['#737373','#737373','#737373','#6b8f6a'][n-1]);
  renderTab(curTab);
}

setTheme(1);
