/* Hero */
.hero{position:relative;overflow:hidden;background:#0a0a0a;padding:48px 0 40px}
.hero::before{content:'';position:absolute;inset:0;opacity:.05;background:

radial-gradient(circle at 80% 20%,#fff 0%,transparent 40%),

.hero-in{max-width:1120px;margin:0 auto;padding:0 28px;position:relative;z-index:1}

.hero .sub{color:#a3a3a3;font-size:14px;margin-bottom:10px}
.hero-m{display:flex;gap:20px;flex-wrap:wrap}
.hero-m span{font-size:13px;color:#525252}

.tab-in{max-width:1120px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:0;overflow-x:auto}
.tab{flex-shrink:0;padding:12px 18px;font-size:13px;font-weight:600;color:var(--mute);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.st-c{background:var(--card);border-radius:var(--rad);padding:16px;text-align:center;border:1px solid var(--line)}

.rec-l{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.rec-t{font-size:15px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-d{font-size:12px;color:var(--mute);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.sh h2{font-size:16px;font-weight:700}
.sh span{font-size:12px;color:var(--mute)}

.card{background:var(--card);border-radius:var(--rad);border:1px solid var(--line);text-decoration:none!important;color:inherit!important;display:block;padding:18px 20px;position:relative;overflow:hidden;cursor:pointer;transition:all .2s}

.card:hover::before{opacity:1}

.card .ti{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .vw{font-size:12px;color:var(--mute);margin-bottom:4px}

.card .su{font-size:13px;color:var(--mute);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.card:hover .go{gap:6px}
.card .meta-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.card .meta-tags span{font-size:10px;padding:2px 6px;border-radius:4px;background:#f5f5f5;color:var(--mute);font-weight:500}

footer{padding:24px 0 40px;text-align:center;font-size:12px;color:var(--mute)}

let curTab=0;

function renderTab(idx){
  const d=DATA[idx];
  // Hero
  document.getElementById('heroTitle').innerHTML=`<em>${d.title}</em>`;

  document.getElementById('heroMeta').innerHTML=d.stat.map(s=>`<span>${s}</span>`).join('');

  document.getElementById('mainContent').innerHTML=

      const cs=['#dc2626','#2563eb','#16a34a','#7c3aed'];
      return `<div class="st-c"><div class="n" style="color:${cs[i]}">${s.split(' ')[0]}</div><div class="l">${s.replace(/^[^\s]+\s/,'')}</div></div>`
    }).join('')}</div>

    <div class="ti">${p.t}</div>
    <div class="vw">👁️ <b>${p.v}</b></div>
    <div class="su">${p.s}</div>

  // Update tabs
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
}

function switchTab(idx){
  curTab=idx;
  setTheme(+document.getElementById('themeSelect').value);
  renderTab(idx);
}

function setTheme(n){
  const t=T[n];
  document.getElementById('themeSelect').value=n;
  document.body.style.background=['#fafafa','#fef1ec','#f0fdfa','#f0f5ec'][n-1];
  document.documentElement.style.setProperty('--line',['#e5e5e5','#f5d5ca','#e5e5e5','#dce5d6'][n-1]);
  document.documentElement.style.setProperty('--accent',t.c);
  document.documentElement.style.setProperty('--ink',['#0a0a0a','#0a0a0a','#0a0a0a','#3a3a3a'][n-1]);
  document.documentElement.style.setProperty('--mute',['#737373','#737373','#737373','#6b8f6a'][n-1]);
  renderTab(curTab);
}
