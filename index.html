<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书热门趋势 · 实时榜单</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d0d;
    --surface:#1a1a1a;
    --surface2:#242424;
    --border:#2a2a2a;
    --text:#f0f0f0;
    --text2:#999;
    --accent:#ff2442;
    --accent2:#ff6b81;
    --gradient:linear-gradient(135deg,#ff2442,#ff6b81,#ff9a76);
    --green:#00c853;
    --orange:#ff9100;
    --blue:#448aff;
  }
  body{
    font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    min-height:100vh;
  }
  .container{max-width:1100px;margin:0 auto;padding:0 24px}

  /* Header */
  header{
    padding:48px 0 32px;
    border-bottom:1px solid var(--border);
    margin-bottom:40px;
  }
  .logo{
    display:flex;align-items:center;gap:12px;
    font-size:28px;font-weight:800;
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .logo svg{width:32px;height:32px}
  .subtitle{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:4px;color:var(--text2);font-size:14px;
  }
  .update-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--surface2);padding:4px 12px;border-radius:20px;
    font-size:12px;color:var(--green);
  }
  .update-badge .dot{
    width:6px;height:6px;border-radius:50%;background:var(--green);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Hot Topics Grid */
  .section-title{
    font-size:20px;font-weight:700;margin-bottom:20px;
    display:flex;align-items:center;gap:8px;
  }
  .hot-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:16px;margin-bottom:48px;
  }
  .hot-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    transition:all .2s;
    position:relative;
    overflow:hidden;
  }
  .hot-card:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
    box-shadow:0 8px 32px rgba(255,36,66,.15);
  }
  .hot-card .rank{
    position:absolute;top:12px;right:16px;
    font-size:40px;font-weight:800;
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    opacity:.15;
    line-height:1;
  }
  .hot-card .title{
    font-size:16px;font-weight:600;
    margin-bottom:8px;
    padding-right:30px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .hot-card .views{
    font-size:13px;color:var(--accent2);font-weight:600;
    margin-bottom:8px;
  }
  .hot-card .summary{
    font-size:13px;color:var(--text2);
    line-height:1.5;
  }
  .hot-card .tag{
    display:inline-block;
    background:rgba(255,36,66,.1);
    color:var(--accent);
    font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:4px;
    margin-bottom:10px;
  }

  /* Trends Section */
  .trends-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:12px;margin-bottom:48px;
  }
  .trend-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    transition:all .2s;
    cursor:default;
  }
  .trend-card:hover{border-color:var(--blue);}
  .trend-card .word{
    font-size:18px;font-weight:700;
    margin-bottom:4px;
  }
  .trend-card .desc{
    font-size:13px;color:var(--text2);
    line-height:1.4;
  }
  .trend-card .hot-label{
    display:inline-block;
    font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:4px;
    margin-bottom:8px;
  }
  .hot-label.emotion{background:rgba(255,145,0,.12);color:var(--orange);}
  .hot-label.awake{background:rgba(68,138,255,.12);color:var(--blue);}
  .hot-label.beauty{background:rgba(255,36,66,.1);color:var(--accent2);}
  .hot-label.exp{background:rgba(0,200,83,.12);color:var(--green);}

  /* Footer */
  footer{
    border-top:1px solid var(--border);
    padding:24px 0 48px;
    text-align:center;
    color:var(--text2);
    font-size:13px;
  }
  footer a{color:var(--accent);text-decoration:none;}

  @media(max-width:640px){
    header{padding:32px 0 24px;margin-bottom:24px;}
    .logo{font-size:22px;}
    .hot-grid{grid-template-columns:1fr;}
    .trends-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      小红书热门趋势
    </div>
    <div class="subtitle">
      <span>实时热搜榜单 · 一句话看懂今日热点</span>
      <span class="update-badge"><span class="dot"></span> 实时更新</span>
    </div>
  </div>
</header>

<main class="container">

  <!-- 🔥 实时热搜 -->
  <div class="section-title">🔥 实时热搜榜单</div>
  <div class="hot-grid" id="hotGrid"></div>

  <!-- 📊 2026 年度趋势热词 -->
  <div class="section-title">📊 2026 年度趋势热词</div>
  <div class="trends-grid" id="trendsGrid"></div>

</main>

<footer>
  <div class="container">
    数据来源：<a href="https://www.46.la/tool/xiaohongshu-hot" target="_blank">四六啦工 · 小红书热搜</a> ·
    趋势分析：<a href="https://www.163.com/dy/article/KQUHNKA30531B128.html" target="_blank">千瓜数据 2026十大热词</a><br>
    Made with ❤️ by Hermes Agent · 数据仅供学习参考

</footer>

<script>

    summary:"把星空藏在指尖——碎钻美甲用极细的闪粉和碎钻打造出‘指尖星河’的效果，举手投足间都是细碎的光。" },

  { word:"AI人格", label:"审美变革", cat:"beauty",

  { word:"柔软力", label:"审美变革", cat:"beauty",

  { word:"代入感", label:"体验升级", cat:"exp",
    desc:"年轻人的『精神出游』——第一视角、沉浸式内容让你身临其境，足不出户环游世界。" },
  { word:"文化力", label:"体验升级", cat:"exp",
    desc:"轻量型文化消费兴起——小票文学、文创周边、美术馆联名，精神价值消费成新趋势。" },

// ============================================================
// Render
// ============================================================
function renderHot(){
  const grid = document.getElementById('hotGrid');
  grid.innerHTML = hotData.map(item => `
    <div class="hot-card">
      <span class="rank">#${item.rank}</span>
      <span class="tag">${item.tag}</span>
      <div class="title">${item.title}</div>
      <div class="views">👁️ ${item.views} 浏览</div>
      <div class="summary">💡 ${item.summary}</div>
    </div>
  `).join('');
}

function renderTrends(){
  const grid = document.getElementById('trendsGrid');
  grid.innerHTML = trendsData.map(item => `
    <div class="trend-card">
      <span class="hot-label ${item.cat}">${item.label}</span>
      <div class="word">${item.word}</div>
      <div class="desc">${item.desc}</div>
    </div>
  `).join('');
}

renderHot();
renderTrends();
</script>
</body>
</html>
