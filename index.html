<style>

h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
footer{text-align:center;padding:20px 0 32px;color:var(--t2);font-size:12px}
@media(max-width:640px){.top-i{flex-direction:column;align-items:flex-start}.st{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:1fr}.rc{flex-direction:column;text-align:center}}

document.getElementById('cardGrid').innerHTML=posts.map(p=>{
