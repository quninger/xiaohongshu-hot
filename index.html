<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 小红书热门趋势 · 今日精选</title>
<style>
  /* ===== Reset & Base ===== */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    /* Theme 1: 明亮活力 ☀️ */
    --bg1:#fff5e6;--card1:#fff;--accent1:#ff6b35;--grad1:linear-gradient(135deg,#ff6b35,#ffb347,#ffd54f);
    --text1:#2d1b00;--text2-1:#8b6f47;--shadow1:0 8px 32px rgba(255,107,53,.15);
    /* Theme 2: 元气满满 🌸 */
    --bg2:#fef0f5;--card2:#fff;--accent2:#e84393;--grad2:linear-gradient(135deg,#e84393,#fd79a8,#e17055);
    --text2:#2d0020;--text2-2:#a0607a;--shadow2:0 8px 32px rgba(232,67,147,.15);
    /* Theme 3: 清新治愈 🌊 */
    --bg3:#e8f8f5;--card3:#fff;--accent3:#00b894;--grad3:linear-gradient(135deg,#00b894,#00cec9,#0984e3);
    --text3:#001a14;--text2-3:#558b7a;--shadow3:0 8px 32px rgba(0,184,148,.15);
    /* Active theme (default: ☀️) */
    --bg:var(--bg1);--card:var(--card1);--accent:var(--accent1);
    --grad:var(--grad1);--text:var(--text1);--text2:var(--text2-1);
    --shadow:var(--shadow1);
  }
  body{
    font-family:'Inter','Noto Sans SC','Segoe UI',sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;
    transition:background .5s,color .3s;min-height:100vh;
  }
  .theme-1{--bg:var(--bg1);--card:var(--card1);--accent:var(--accent1);--grad:var(--grad1);--text:var(--text1);--text2:var(--text2-1);--shadow:var(--shadow1);}
  .theme-2{--bg:var(--bg2);--card:var(--card2);--accent:var(--accent2);--grad:var(--grad2);--text:var(--text2);--text2:var(--text2-2);--shadow:var(--shadow2);}
  .theme-3{--bg:var(--bg3);--card:var(--card3);--accent:var(--accent3);--grad:var(--grad3);--text:var(--text3);--text2:var(--text2-3);--shadow:var(--shadow3);}

  /* ===== Sticky Top Bar ===== */
  .top-bar{
    position:sticky;top:0;z-index:100;
    background:var(--grad);padding:0;box-shadow:0 4px 20px rgba(0,0,0,.1);
    transition:background .5s;
  }
  .top-inner{
    max-width:1100px;margin:0 auto;padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  .top-date{color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
  .top-date .badge{
    background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;
    font-size:12px;font-weight:600;
  }
  .top-picks{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .top-pick{
    display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);
    padding:4px 12px;border-radius:20px;color:#fff;font-size:12px;font-weight:500;
    text-decoration:none;transition:background .2s;
  }
  .top-pick:hover{background:rgba(255,255,255,.3);}
  .top-pick .star{font-size:14px;}

  /* ===== Theme Switcher ===== */
  .theme-switcher{
    display:flex;justify-content:center;gap:12px;margin-top:32px;margin-bottom:8px;
  }
  .theme-btn{
    padding:10px 24px;border:2px solid var(--accent);border-radius:30px;
    background:transparent;cursor:pointer;font-size:14px;font-weight:600;
    color:var(--accent);transition:all .3s;font-family:inherit;
  }
  .theme-btn.active{
    background:var(--grad);color:#fff;border-color:transparent;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
  }
  .theme-btn:hover{transform:translateY(-2px);}

  /* ===== Container ===== */
  .container{max-width:1100px;margin:0 auto;padding:0 24px;}

  /* ===== Hero Section ===== */
  .hero{
    text-align:center;padding:24px 0 32px;
  }
  .hero h1{
    font-size:36px;font-weight:800;
    background:var(--grad);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:8px;
  }
  .hero p{color:var(--text2);font-size:15px;}

  /* ===== Recommendation Banner ===== */
  .rec-banner{
    background:var(--card);border-radius:20px;padding:24px 28px;
    margin-bottom:32px;box-shadow:var(--shadow);
    border:1px solid rgba(0,0,0,.04);
    display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  }
  .rec-banner .rec-icon{
    width:64px;height:64px;border-radius:50%;
    background:var(--grad);display:flex;align-items:center;justify-content:center;
    font-size:28px;flex-shrink:0;
  }
  .rec-banner .rec-content{flex:1;min-width:200px;}
  .rec-banner .rec-label{
    font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;
    letter-spacing:1px;margin-bottom:2px;
  }
  .rec-banner .rec-title{font-size:18px;font-weight:700;margin-bottom:4px;}
  .rec-banner .rec-desc{font-size:14px;color:var(--text2);line-height:1.5;}
  .rec-banner .rec-link{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--grad);color:#fff;padding:10px 24px;border-radius:30px;
    text-decoration:none;font-weight:600;font-size:14px;
    transition:transform .2s;flex-shrink:0;
  }
  .rec-banner .rec-link:hover{transform:scale(1.05);}

  /* ===== Day Summary ===== */
  .day-summary{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:12px;margin-bottom:32px;
  }
  .stat-card{
    background:var(--card);border-radius:14px;padding:16px 20px;
    text-align:center;box-shadow:var(--shadow);
    border:1px solid rgba(0,0,0,.04);
  }
  .stat-card .num{
    font-size:28px;font-weight:800;
    background:var(--grad);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text;
  }
  .stat-card .label{font-size:13px;color:var(--text2);margin-top:2px;}

  /* ===== Card Grid ===== */
  .section-label{
    font-size:13px;font-weight:600;color:var(--accent);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;
  }
  .section-title{
    font-size:22px;font-weight:700;margin-bottom:20px;
    display:flex;align-items:center;gap:8px;
  }
  .card-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;margin-bottom:48px;
  }
  .card{
    background:var(--card);border-radius:18px;overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.04);transition:all .3s;
    border:1px solid rgba(0,0,0,.04);
    cursor:pointer;
  }
  .card:hover{
    transform:translateY(-4px);box-shadow:var(--shadow);
  }
  .card-img-wrap{
    width:100%;height:200px;overflow:hidden;position:relative;
  }
  .card-img-wrap img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .4s;
  }
  .card:hover .card-img-wrap img{transform:scale(1.05);}
  .card-rank{
    position:absolute;top:12px;left:12px;
    width:32px;height:32px;border-radius:50%;
    background:var(--grad);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;
  }
  .card-tag{
    position:absolute;bottom:12px;left:12px;
    background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
    color:#fff;padding:3px 10px;border-radius:8px;
    font-size:11px;font-weight:600;
  }
  .card-body{padding:16px 18px 18px;}
  .card-title{
    font-size:15px;font-weight:600;margin-bottom:6px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card-views{
    font-size:13px;color:var(--accent);font-weight:600;margin-bottom:6px;
  }
  .card-summary{
    font-size:13px;color:var(--text2);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card-link{
    display:inline-flex;align-items:center;gap:4px;
    margin-top:10px;font-size:13px;font-weight:600;color:var(--accent);
    text-decoration:none;transition:gap .2s;
  }
  .card:hover .card-link{gap:8px;}
  a{color:inherit;text-decoration:none;}
  .card a::after{content:'';position:absolute;inset:0;z-index:1;}

  /* ===== Footer ===== */
  footer{
    text-align:center;padding:32px 0 48px;
    color:var(--text2);font-size:13px;
  }

  /* ===== Theme 3 special layout ===== */
  .theme-3 .card-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
  .theme-3 .card{border-radius:24px;}
  .theme-3 .card-img-wrap{height:180px;}
  .theme-3 .card-body{padding:14px 16px;}
  .theme-3 .card-rank{width:28px;height:28px;font-size:12px;}

  /* ===== Mobile ===== */
  @media(max-width:640px){
    .hero h1{font-size:26px;}
    .top-inner{flex-direction:column;align-items:flex-start;}
    .theme-btn{padding:8px 16px;font-size:13px;}
    .rec-banner{flex-direction:column;text-align:center;}
    .card-grid{grid-template-columns:1fr !important;}
  }
</style>
</head>
<body class="theme-1">

<!-- ===== STICKY TOP BAR ===== -->
<div class="top-bar">
  <div class="top-inner">
    <div class="top-date">
      🔥 今日精选 · <span id="todayDate"></span>
      <span class="badge">实时</span>
    </div>
    <div class="top-picks" id="topPicks"></div>
  </div>
</div>

<!-- ===== THEME SWITCHER ===== -->
<div class="theme-switcher">
  <button class="theme-btn active" data-theme="1" onclick="switchTheme(1)">☀️ 明亮活力</button>
  <button class="theme-btn" data-theme="2" onclick="switchTheme(2)">🌸 元气满满</button>
  <button class="theme-btn" data-theme="3" onclick="switchTheme(3)">🌊 清新治愈</button>
</div>

<div class="container">
  <!-- ===== HERO ===== -->
  <div class="hero">
    <h1 id="heroTitle">☀️ 小红书的快乐星球</h1>
    <p id="heroDesc">今天大家都在看什么？一份充满阳光的热门指南 ✨</p>
  </div>

  <!-- ===== DAY SUMMARY ===== -->
  <div class="day-summary" id="daySummary"></div>

  <!-- ===== RECOMMENDATION BANNER ===== -->
  <div class="rec-banner" id="recBanner"></div>

  <!-- ===== HOT CARDS ===== -->
  <div class="section-label">✨ 今日热门</div>
  <div class="section-title">🔥 大家都在刷 <span id="themeLabel">这些</span></div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<footer>Made with ❤️ · 数据来源 小红书热搜 · 点击卡片直达原文</footer>

<script>
// ===== DATA =====
const posts = [
  {rank:1, title:"用万能旅行拍照姿势美美出片", views:"918.6万", tag:"🌍 旅行",
   summary:"不用再比剪刀手了！万能旅行拍照姿势公式，转个身、低个头，氛围感拉满——每一张都是朋友圈封面。",
   url:"https://www.xiaohongshu.com/search_result?keyword=用万能旅行拍照姿势美美出片&type=51",
   img:"https://picsum.photos/seed/xhs1/600/400"},
  {rank:2, title:"耗时三年拍下古诗词里的中国", views:"907万", tag:"🏮 文化",
   summary:"摄影师走遍大江南北，把古诗词中的意境变成照片——原来「落霞与孤鹜齐飞」是真实存在的画面，每一帧都是中式浪漫。",
   url:"https://www.xiaohongshu.com/search_result?keyword=耗时三年拍下古诗词里的中国&type=51",
   img:"https://picsum.photos/seed/xhs2/600/400"},
  {rank:3, title:"我拍到了海鸥雨", views:"887.5万", tag:"📸 摄影",
   summary:"数百只海鸥同时振翅，在海面上空形成了一场「海鸥雨」——大自然的随机艺术，永远比精心设计更震撼。",
   url:"https://www.xiaohongshu.com/search_result?keyword=我拍到了海鸥雨&type=51",
   img:"https://picsum.photos/seed/xhs3/600/400"},
  {rank:4, title:"超日常美食教程速来get", views:"867.6万", tag:"🍜 美食",
   summary:"10分钟搞定一顿有仪式感的饭！不想点外卖又懒得做大菜？这些超简单日常美食教程，厨房小白也能秒变大厨。",
   url:"https://www.xiaohongshu.com/search_result?keyword=超日常美食教程速来get&type=51",
   img:"https://picsum.photos/seed/xhs4/600/400"},
  {rank:5, title:"定格这一刻的日照金山", views:"857万", tag:"🏔 旅行",
   summary:"梅里雪山的日照金山被完美定格，金色光芒从山顶倾泻而下——高反也值得，这是大自然给早起的人最大的奖赏。",
   url:"https://www.xiaohongshu.com/search_result?keyword=定格这一刻的日照金山&type=51",
   img:"https://picsum.photos/seed/xhs5/600/400"},
  {rank:6, title:"拍到了洱海的丁达尔效应", views:"695.5万", tag:"📸 摄影",
   summary:"阳光穿过云层洒向洱海，形成完美的丁达尔效应光束——这不是滤镜，是大自然自己的光影魔法，看一眼就治愈了。",
   url:"https://www.xiaohongshu.com/search_result?keyword=拍到了洱海的丁达尔效应&type=51",
   img:"https://picsum.photos/seed/xhs6/600/400"},
  {rank:7, title:"珠圆玉润妆完全是淡颜天菜", views:"684.7万", tag:"💄 美妆",
   summary:"淡颜系女生的本命妆容！用光泽感取代浓墨重彩，五官看起来温柔又高级——越看越耐看，素颜也能驾驭。",
   url:"https://www.xiaohongshu.com/search_result?keyword=珠圆玉润妆完全是淡颜天菜&type=51",
   img:"https://picsum.photos/seed/xhs7/600/400"},
  {rank:8, title:"碎钻美甲指尖藏着细碎星光", views:"652万", tag:"💅 美甲",
   summary:"把星空藏在指尖——极细的闪粉和碎钻打造「指尖星河」，举手投足间都是细碎的光，仙女必备款。",
   url:"https://www.xiaohongshu.com/search_result?keyword=碎钻美甲指尖藏着细碎星光&type=51",
   img:"https://picsum.photos/seed/xhs8/600/400"},
  {rank:9, title:"我来当旅行中的颜色猎手", views:"642.3万", tag:"🎨 生活",
   summary:"把旅行变成颜色收集游戏！在每一个城市寻找它的代表色，用镜头当调色盘——你的城市是什么颜色的？",
   url:"https://www.xiaohongshu.com/search_result?keyword=我来当旅行中的颜色猎手&type=51",
   img:"https://picsum.photos/seed/xhs9/600/400"},
];

// ===== THEME CONFIG =====
const themes = {
  1: {
    name: "☀️ 明亮活力", body: "theme-1",
    title: "☀️ 小红书的快乐星球",
    desc: "今天大家都在看什么？一份充满阳光的热门指南 ✨",
    label: "阳光爆款",
    topColor: "linear-gradient(135deg,#ff6b35,#ffb347,#ffd54f)",
    topEmoji: "☀️"
  },
  2: {
    name: "🌸 元气满满", body: "theme-2",
    title: "🌸 今天也是元气满满的一天",
    desc: "粉粉嫩嫩的热门合集，专治不开心 💖",
    label: "甜心精选",
    topColor: "linear-gradient(135deg,#e84393,#fd79a8,#e17055)",
    topEmoji: "🌸"
  },
  3: {
    name: "🌊 清新治愈", body: "theme-3",
    title: "🌊 在夏天的风里刷小红书",
    desc: "薄荷味的热门推荐，清凉一夏 🍃",
    label: "治愈清单",
    topColor: "linear-gradient(135deg,#00b894,#00cec9,#0984e3)",
    topEmoji: "🌊"
  }
};

// ===== RENDER =====
function render(){
  // Top bar - today
  const now = new Date();
  document.getElementById('todayDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  // Top picks (top 3)
  const picksHtml = posts.slice(0,3).map(p =>
    `<a class="top-pick" href="${p.url}" target="_blank">
      <span class="star">⭐</span> #${p.rank} ${p.title.slice(0,15)}...
    </a>`
  ).join('');
  document.getElementById('topPicks').innerHTML = picksHtml;

  // Day summary stats
  const tags = [...new Set(posts.map(p=>p.tag))];
  const totalViews = posts.reduce((s,p)=>s+parseFloat(p.views),0);
  document.getElementById('daySummary').innerHTML = `
    <div class="stat-card"><div class="num">${posts.length}</div><div class="label">🔥 今日热门</div></div>
    <div class="stat-card"><div class="num">${tags.length}</div><div class="label">🏷️ 覆盖领域</div></div>
    <div class="stat-card"><div class="num">${(totalViews/10000).toFixed(1)}亿</div><div class="label">👁️ 总浏览量</div></div>
    <div class="stat-card"><div class="num">${tags.join(' ')}</div><div class="label">📂 旅行 · 摄影 · 美食 · 美妆</div></div>
  `;

  // Recommendation banner (top 1)
  const top = posts[0];
  document.getElementById('recBanner').innerHTML = `
    <div class="rec-icon">🏆</div>
    <div class="rec-content">
      <div class="rec-label">⭐ 今日重点推荐</div>
      <div class="rec-title">#${top.rank} ${top.title}</div>
      <div class="rec-desc">${top.summary}</div>
    </div>
    <a class="rec-link" href="${top.url}" target="_blank">
      去看看 → <span style="font-size:12px;">${top.views}</span>
    </a>
  `;

  // Cards
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = posts.map(p => `
    <a class="card" href="${p.url}" target="_blank">
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.title}" loading="lazy">
        <div class="card-rank">${p.rank}</div>
        <div class="card-tag">${p.tag}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-views">👁️ ${p.views} 浏览</div>
        <div class="card-summary">${p.summary}</div>
        <div class="card-link">去小红书看看 →</div>
      </div>
    </a>
  `).join('');
}

// ===== SWITCH THEME =====
function switchTheme(n){
  const t = themes[n];
  // Update body class
  document.body.className = t.body;
  // Update top bar
  document.querySelector('.top-bar').style.background = t.topColor;
  // Update hero
  document.getElementById('heroTitle').textContent = t.title;
  document.getElementById('heroDesc').textContent = t.desc;
  document.getElementById('themeLabel').textContent = t.label;
  // Update buttons
  document.querySelectorAll('.theme-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i+1 === n);
  });
  // Update recommendation icon based on theme
  const recIcon = document.querySelector('.rec-icon');
  if(recIcon) recIcon.textContent = n === 1 ? '🏆' : n === 2 ? '💖' : '🍃';
}

// ===== INIT =====
render();
switchTheme(1);
</script>
</body>
</html>
